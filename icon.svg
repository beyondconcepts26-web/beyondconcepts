<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Beyond Concepts">
  <defs>
    <linearGradient id="ic-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="ic-gold2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="ic-gold3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="ic-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#ic-glow)">
    <line x1="5"  y1="42" x2="19" y2="6"  stroke="url(#ic-gold)"  stroke-width="5.5" stroke-linecap="round"/>
    <line x1="17" y1="42" x2="31" y2="6"  stroke="url(#ic-gold2)" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="29" y1="42" x2="43" y2="6"  stroke="url(#ic-gold3)" stroke-width="5.5" stroke-linecap="round"/>
  </g>
</svg>
