<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" width="280" height="72" role="img" aria-label="Beyond Concepts">
  <defs>
    <linearGradient id="bc-grad-d" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="bc-grad2-d" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="bc-grad3-d" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Mark: Triple forward slash -->
  <line x1="6"  y1="60" x2="24" y2="12" stroke="url(#bc-grad-d)"  stroke-width="5.5" stroke-linecap="round"/>
  <line x1="19" y1="60" x2="37" y2="12" stroke="url(#bc-grad2-d)" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="32" y1="60" x2="50" y2="12" stroke="url(#bc-grad3-d)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Separator -->
  <line x1="64" y1="18" x2="64" y2="54" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Wordmark -->
  <text
    x="78" y="38"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="19"
    font-weight="800"
    fill="#FFFFFF"
    letter-spacing="-0.4"
  >beyond</text>
  <text
    x="79" y="57"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11.5"
    font-weight="400"
    fill="rgba(255,255,255,0.45)"
    letter-spacing="4.5"
  >CONCEPTS</text>
</svg>
